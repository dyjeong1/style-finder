openapi: 3.1.0
info:
  title: StyleMatch API
  version: 0.2.0
  description: |
    스타일매치 MVP 구현용 상세 OpenAPI 명세.
    공통 응답 포맷은 data/error/meta 형태를 사용한다.

servers:
  - url: http://localhost:8000
    description: local

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Upload
  - name: Recommendation
  - name: Wishlist

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenApiResponse'
              examples:
                success:
                  value:
                    data:
                      access_token: <SECRET>
                      token_type: bearer
                      expires_in: 3600
                    error: null
                    meta:
                      request_id: req_9f4e7a
                      timestamp: '2026-04-01T19:20:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthFailedError'

  /images/upload:
    post:
      tags: [Upload]
      summary: 코디 이미지 업로드
      operationId: uploadImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: 업로드 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadedImageApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /recommendations:
    get:
      tags: [Recommendation]
      summary: 추천 결과 조회
      operationId: getRecommendations
      parameters:
        - in: query
          name: uploaded_image_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: category
          required: false
          schema:
            $ref: '#/components/schemas/ProductCategory'
        - in: query
          name: min_price
          required: false
          schema:
            type: integer
            minimum: 0
        - in: query
          name: max_price
          required: false
          schema:
            type: integer
            minimum: 0
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [similarity_desc, price_asc, price_desc]
            default: similarity_desc
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
      responses:
        '200':
          description: 추천 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationListApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/RecommendationNotFoundError'

  /wishlist:
    get:
      tags: [Wishlist]
      summary: 찜 목록 조회
      operationId: getWishlist
      parameters:
        - in: query
          name: category
          required: false
          schema:
            $ref: '#/components/schemas/ProductCategory'
      responses:
        '200':
          description: 찜 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistListApiResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags: [Wishlist]
      summary: 찜 추가
      operationId: addWishlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id]
              properties:
                product_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: 찜 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistItemApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/WishlistConflictError'

  /wishlist/{product_id}:
    delete:
      tags: [Wishlist]
      summary: 찜 삭제
      operationId: removeWishlist
      parameters:
        - in: path
          name: product_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/WishlistNotFoundError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ValidationError:
      description: 요청 검증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
          examples:
            invalid_price:
              value:
                data: null
                error:
                  code: VALIDATION_INVALID_PARAM
                  message: max_price must be greater than or equal to min_price.
                  detail:
                    field: max_price
                meta:
                  request_id: req_0f5b9c
                  timestamp: '2026-04-01T19:20:00Z'

    UnauthorizedError:
      description: 인증 토큰 누락 또는 만료
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
          examples:
            unauthorized:
              value:
                data: null
                error:
                  code: AUTH_UNAUTHORIZED
                  message: Access token is missing or invalid.
                  detail: {}
                meta:
                  request_id: req_3ac21e
                  timestamp: '2026-04-01T19:20:00Z'

    AuthFailedError:
      description: 로그인 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
          examples:
            login_failed:
              value:
                data: null
                error:
                  code: AUTH_LOGIN_FAILED
                  message: Invalid email or password.
                  detail: {}
                meta:
                  request_id: req_72bcab
                  timestamp: '2026-04-01T19:20:00Z'

    RecommendationNotFoundError:
      description: 업로드 이미지에 대한 추천 결과 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
          examples:
            not_found:
              value:
                data: null
                error:
                  code: RECOMMENDATION_NOT_FOUND
                  message: Recommendation result does not exist for uploaded_image_id.
                  detail:
                    uploaded_image_id: e7f1cf93-4ddd-446a-aad1-cf97c8f8fc4b
                meta:
                  request_id: req_b2fa55
                  timestamp: '2026-04-01T19:20:00Z'

    WishlistConflictError:
      description: 이미 찜한 상품
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
          examples:
            duplicated:
              value:
                data: null
                error:
                  code: WISHLIST_ALREADY_EXISTS
                  message: The product is already in wishlist.
                  detail: {}
                meta:
                  request_id: req_9d9d11
                  timestamp: '2026-04-01T19:20:00Z'

    WishlistNotFoundError:
      description: 찜 항목 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
          examples:
            not_found:
              value:
                data: null
                error:
                  code: WISHLIST_NOT_FOUND
                  message: The wishlist item does not exist.
                  detail: {}
                meta:
                  request_id: req_4272de
                  timestamp: '2026-04-01T19:20:00Z'

  schemas:
    ApiMeta:
      type: object
      required: [request_id, timestamp]
      properties:
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: AUTH_*, VALIDATION_*, RECOMMENDATION_*, WISHLIST_*
        message:
          type: string
        detail:
          type: object
          additionalProperties: true

    ErrorApiResponse:
      type: object
      required: [data, error, meta]
      properties:
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    AuthToken:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 3600

    AuthTokenApiResponse:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/AuthToken'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    UploadedImage:
      type: object
      required: [id, image_url, created_at]
      properties:
        id:
          type: string
          format: uuid
        image_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

    UploadedImageApiResponse:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/UploadedImage'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    ProductCategory:
      type: string
      enum: [top, bottom, outer, shoes, bag, accessory]

    RecommendationItem:
      type: object
      required:
        - product_id
        - source
        - product_name
        - category
        - price
        - product_url
        - image_url
        - similarity_score
        - rank
      properties:
        product_id:
          type: string
          format: uuid
        source:
          type: string
          enum: [zigzag, 29cm]
        product_name:
          type: string
        category:
          $ref: '#/components/schemas/ProductCategory'
        price:
          type: integer
          minimum: 0
        product_url:
          type: string
          format: uri
        image_url:
          type: string
          format: uri
        similarity_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        rank:
          type: integer
          minimum: 1

    RecommendationList:
      type: object
      required: [items, total_count]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationItem'
        total_count:
          type: integer
          minimum: 0

    RecommendationListApiResponse:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/RecommendationList'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    WishlistItem:
      type: object
      required: [id, product_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    WishlistList:
      type: object
      required: [items, total_count]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WishlistItem'
        total_count:
          type: integer
          minimum: 0

    WishlistItemApiResponse:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/WishlistItem'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    WishlistListApiResponse:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/WishlistList'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/ApiMeta'
